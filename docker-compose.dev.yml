name: crewmeld-dev

services:
  db:
    image: pgvector/pgvector:pg17
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-crewmeld}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - crewmeld_pg_data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - crewmeld_redis_data:/data

  ollama:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - crewmeld_ollama_data:/root/.ollama

volumes:
  crewmeld_pg_data:
  crewmeld_redis_data:
  crewmeld_ollama_data:
