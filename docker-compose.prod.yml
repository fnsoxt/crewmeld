x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '5'

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SSL_CERT_DIR:-./certs}:/etc/nginx/certs:ro
    depends_on:
      crewmeld:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost/nginx-health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'

  crewmeld:
    image: proinsight/crewmeld:${VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crewmeld}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BETTER_AUTH_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - APP_BASE_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - API_ENCRYPTION_KEY=${API_ENCRYPTION_KEY:-}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - RAGFLOW_URL=${RAGFLOW_URL:-}
      - SOCKET_SERVER_URL=http://realtime:3002
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
      # MinIO object storage (tool file uploads)
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?MINIO_ENDPOINT must be set}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-crewmeld-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-tool-files}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:?MINIO_PUBLIC_URL must be set}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      realtime:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  realtime:
    image: proinsight/crewmeld-realtime:${VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crewmeld}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_URL=${NEXT_PUBLIC_APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://127.0.0.1:3002/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrations:
    image: proinsight/crewmeld-migrations:${VERSION:-latest}
    working_dir: /app/packages/db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crewmeld}
    depends_on:
      db:
        condition: service_healthy
    command: ['bun', 'run', 'db:migrate']
    restart: 'no'

  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    logging: *default-logging
    # By default not exposed to host; only reachable on the internal Docker network.
    # Uncomment for debugging (bind to 127.0.0.1 to prevent external access):
    # ports:
    #   - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    expose:
      - '5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-crewmeld}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  cron:
    image: curlimages/curl:8.5.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - APP_URL=http://crewmeld:3000
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/webhooks/poll/email-channels;
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/webhooks/poll/imap;
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/webhooks/poll/gmail;
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/webhooks/poll/outlook;
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/webhooks/poll/rss;
        curl -sf -H \"Authorization: Bearer $$CRON_SECRET\" $$APP_URL/api/schedules/execute;
        sleep 60;
      done"
    depends_on:
      crewmeld:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  # ====== RAGFlow knowledge-base engine (optional, enable via COMPOSE_PROFILES=ragflow) ======
  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.15.1-slim}
    profiles: ['ragflow']
    restart: unless-stopped
    logging: *default-logging
    environment:
      - RAGFLOW_HOST=0.0.0.0
      - RAGFLOW_HTTP_PORT=9380
    volumes:
      - ragflow_data:/ragflow/data
    expose:
      - '9380'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9380/api/v1/datasets?page=1&page_size=1 -H "Authorization: Bearer dummy" || exit 0']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${RAGFLOW_MEMORY_LIMIT:-8G}
          cpus: '4'

  # ====== OpenClaw Gateway (optional, uncomment to enable) ======
  # openclaw:
  #   image: proinsight/crewmeld-openclaw:${VERSION:-latest}
  #   restart: unless-stopped
  #   logging: *default-logging
  #   environment:
  #     - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
  #     - OPENCLAW_GATEWAY_HOST=0.0.0.0
  #     - OPENCLAW_GATEWAY_PORT=18789
  #   volumes:
  #     - openclaw_data:/home/node/.openclaw
  #   healthcheck:
  #     test: ['CMD-SHELL', 'curl -f http://localhost:18789/tools/invoke -H "Authorization: Bearer $$OPENCLAW_GATEWAY_TOKEN" -H "Content-Type: application/json" -d "{\"tool\":\"sessions_list\"}" || exit 1']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G
  #         cpus: '2'

volumes:
  postgres_data:
  redis_data:
  ragflow_data:
  # openclaw_data:

networks:
  default:
    name: crewmeld-network
