{{- if .Values.app.enabled }}
{{- include "crewmeld.validateSecrets" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crewmeld.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crewmeld.app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "crewmeld.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "crewmeld.app.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "crewmeld.serviceAccountName" . }}
      {{- include "crewmeld.podSecurityContext" .Values.app | nindent 6 }}
      {{- include "crewmeld.nodeSelector" .Values.app | nindent 6 }}
      {{- include "crewmeld.tolerations" .Values | nindent 6 }}
      {{- include "crewmeld.affinity" .Values | nindent 6 }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: migrations
          image: {{ include "crewmeld.image" (dict "context" . "image" .Values.migrations.image) }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              cd /app/packages/db
              export DATABASE_URL="{{ include "crewmeld.databaseUrl" . }}"
              bun run db:migrate
          envFrom:
            {{- if .Values.postgresql.enabled }}
            - secretRef:
                name: {{ include "crewmeld.postgresqlSecretName" . }}
            {{- else if .Values.externalDatabase.enabled }}
            - secretRef:
                name: {{ include "crewmeld.externalDbSecretName" . }}
            {{- end }}
          {{- include "crewmeld.resources" .Values.migrations | nindent 10 }}
          {{- include "crewmeld.securityContext" .Values.migrations | nindent 10 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "crewmeld.image" (dict "context" . "image" .Values.app.image) }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.service.targetPort }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "crewmeld.databaseUrl" . | quote }}
            - name: SOCKET_SERVER_URL
              value: {{ include "crewmeld.socketServerUrl" . | quote }}
            - name: OLLAMA_URL
              value: {{ include "crewmeld.ollamaUrl" . | quote }}
            {{- range $key, $value := omit .Values.app.env "DATABASE_URL" "SOCKET_SERVER_URL" "OLLAMA_URL" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ include "crewmeld.redisUrl" . | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.redis.auth.existingSecret.enabled }}
                  name: {{ .Values.redis.auth.existingSecret.name }}
                  key: {{ .Values.redis.auth.existingSecret.passwordKey }}
                  {{- else }}
                  name: {{ include "crewmeld.fullname" . }}-redis
                  key: redis-password
                  {{- end }}
            {{- end }}
            {{- if .Values.license.enabled }}
            - name: CREWMELD_LICENSE_PATH
              value: {{ .Values.license.mountPath | quote }}
            {{- end }}
            # K8s deployment info (Downward API + Helm metadata)
            - name: CREWMELD_DEPLOY_MODE
              value: "k8s"
            - name: CREWMELD_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CREWMELD_K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CREWMELD_K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CREWMELD_HELM_RELEASE
              value: {{ .Release.Name | quote }}
            - name: CREWMELD_HELM_CHART_VERSION
              value: {{ .Chart.Version | quote }}
            {{- if .Values.telemetry.enabled }}
            # OpenTelemetry configuration
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "crewmeld.fullname" . }}-otel-collector:4318"
            - name: OTEL_SERVICE_NAME
              value: crewmeld-app
            - name: OTEL_SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=crewmeld-app,service.version={{ .Chart.AppVersion }},deployment.environment={{ .Values.app.env.NODE_ENV }}"
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            # App secrets (authentication, encryption keys)
            - secretRef:
                name: {{ include "crewmeld.appSecretName" . }}
            # Database secrets
            {{- if .Values.postgresql.enabled }}
            - secretRef:
                name: {{ include "crewmeld.postgresqlSecretName" . }}
            {{- else if .Values.externalDatabase.enabled }}
            - secretRef:
                name: {{ include "crewmeld.externalDbSecretName" . }}
            {{- end }}
          {{- if .Values.app.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.app.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.app.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.app.readinessProbe | nindent 12 }}
          {{- end }}
          {{- include "crewmeld.resources" .Values.app | nindent 10 }}
          {{- include "crewmeld.securityContext" .Values.app | nindent 10 }}
          {{- $hasBranding := and .Values.branding.enabled (or .Values.branding.files .Values.branding.binaryFiles) }}
          {{- $hasLicense := include "crewmeld.licenseEnabled" . }}
          {{- if or $hasBranding $hasLicense .Values.extraVolumeMounts .Values.app.extraVolumeMounts }}
          volumeMounts:
            {{- if $hasBranding }}
            - name: branding
              mountPath: {{ .Values.branding.mountPath | default "/app/public/branding" }}
              readOnly: true
            {{- end }}
            {{- if $hasLicense }}
            - name: license-volume
              mountPath: {{ .Values.license.mountPath }}
              subPath: {{ .Values.license.subPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.app.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- $hasBranding := and .Values.branding.enabled (or .Values.branding.files .Values.branding.binaryFiles) }}
      {{- $hasLicense := include "crewmeld.licenseEnabled" . }}
      {{- if or $hasBranding $hasLicense .Values.extraVolumes .Values.app.extraVolumes }}
      volumes:
        {{- if $hasBranding }}
        - name: branding
          configMap:
            name: {{ include "crewmeld.fullname" . }}-branding
        {{- end }}
        {{- if $hasLicense }}
        - name: license-volume
          secret:
            {{- if .Values.license.existingSecret.enabled }}
            secretName: {{ .Values.license.existingSecret.name }}
            items:
              - key: {{ .Values.license.existingSecret.key }}
                path: {{ .Values.license.subPath }}
            {{- else }}
            secretName: {{ include "crewmeld.fullname" . }}-license
            items:
              - key: license.key
                path: {{ .Values.license.subPath }}
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.app.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}