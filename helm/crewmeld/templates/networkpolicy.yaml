    matchLabels:
      {{- include "crewmeld.realtime.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from main application
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.app.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.realtime.service.targetPort }}
  # Allow ingress from ingress controller
  {{- if .Values.ingress.enabled }}
  - from: []
    ports:
    - protocol: TCP
      port: {{ .Values.realtime.service.targetPort }}
  {{- end }}
  egress:
  # Allow egress to PostgreSQL
  {{- if .Values.postgresql.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.postgresql.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.postgresql.service.targetPort }}
  {{- end }}
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS egress for external APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow custom egress rules
  {{- with .Values.networkPolicy.egress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}

{{- if .Values.postgresql.enabled }}
---
# Network Policy for PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crewmeld.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crewmeld.postgresql.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crewmeld.postgresql.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from main application
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.app.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.postgresql.service.targetPort }}
  # Allow ingress from realtime service
  {{- if .Values.realtime.enabled }}
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.realtime.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.postgresql.service.targetPort }}
  {{- end }}
  # Allow ingress from migrations job
  {{- if .Values.migrations.enabled }}
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.migrations.labels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.postgresql.service.targetPort }}
  {{- end }}
  egress:
  # Allow minimal egress (for health checks, etc.)
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
{{- end }}

{{- if .Values.ollama.enabled }}
---
# Network Policy for Ollama
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crewmeld.fullname" . }}-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crewmeld.ollama.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crewmeld.ollama.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from main application
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.app.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.ollama.service.targetPort }}
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS egress for model downloads
  - to: []
    ports:
    - protocol: TCP
      port: 443
{{- end }}
{{- end }}