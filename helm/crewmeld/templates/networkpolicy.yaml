{{- if .Values.networkPolicy.enabled }}
---
# Network Policy for main application
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "crewmeld.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crewmeld.app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "crewmeld.app.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from realtime service
  {{- if .Values.realtime.enabled }}
  - from:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.realtime.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.app.service.targetPort }}
  {{- end }}
  # Allow ingress from ingress controller
  {{- if .Values.ingress.enabled }}
  - from: []
    ports:
    - protocol: TCP
      port: {{ .Values.app.service.targetPort }}
  {{- end }}
  # Allow custom ingress rules
  {{- with .Values.networkPolicy.ingress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  egress:
  # Allow egress to PostgreSQL
  {{- if .Values.postgresql.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.postgresql.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.postgresql.service.targetPort }}
  {{- end }}
  # Allow egress to realtime service
  {{- if .Values.realtime.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.realtime.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.realtime.service.targetPort }}
  {{- end }}
  # Allow egress to Redis
  {{- if .Values.redis.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.redis.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.redis.service.port }}
    {{- if .Values.redis.sentinel.enabled }}
    - protocol: TCP
      port: {{ .Values.redis.sentinel.port }}
    {{- end }}
  {{- end }}
  # Allow egress to Ollama
  {{- if .Values.ollama.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "crewmeld.ollama.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: {{ .Values.ollama.service.targetPort }}
  {{- end }}
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS egress for external APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443
  # Allow custom egress rules
  {{- with .Values.networkPolicy.egress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}

{{- if .Values.realtime.enabled }}
---
